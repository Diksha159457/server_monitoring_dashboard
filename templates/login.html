<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — ServerWatch</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
/* ── THEME VARIABLES ── */
:root, [data-theme="dark"] {
  --bg:      #060b14;
  --surface: #0d1520;
  --surface2:#111d2e;
  --border:  #1e3050;
  --border2: #254068;
  --accent:  #3b82f6;
  --accent2: #6366f1;
  --danger:  #ef4444;
  --success: #10b981;
  --text:    #e2e8f0;
  --text2:   #94a3b8;
  --muted:   #475569;
  --card-shadow: rgba(0,0,0,0.6);
}

[data-theme="light"] {
  --bg:      #f8fafc;
  --surface: #ffffff;
  --surface2:#f1f5f9;
  --border:  #e2e8f0;
  --border2: #cbd5e1;
  --accent:  #2563eb;
  --accent2: #4f46e5;
  --danger:  #dc2626;
  --success: #16a34a;
  --text:    #0f172a;
  --text2:   #475569;
  --muted:   #94a3b8;
  --card-shadow: rgba(0,0,0,0.1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg); color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  transition: background 0.3s ease, color 0.3s ease;
  overflow:hidden;
}

/* ── Theme Switcher UI (Floating Top Right) ── */
.theme-switcher {
  position: fixed; top: 20px; right: 20px; z-index: 100;
  display: flex; gap: 4px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px; padding: 4px;
}
.theme-btn {
  width: 32px; height: 32px; border-radius: 7px; border: none; cursor: pointer;
  background: transparent; color: var(--text2); font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.theme-btn.active { background: var(--accent); color: white; }

/* ── Animated background ── */
.bg-anim{ position:fixed;inset:0;z-index:0;overflow:hidden; }
.bg-orb{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;
  animation:float 8s ease-in-out infinite;
}
[data-theme="light"] .bg-orb { opacity: 0.08; }
.orb1{width:500px;height:500px;background:#3b82f6;top:-100px;left:-150px;animation-delay:0s}
.orb2{width:400px;height:400px;background:#6366f1;bottom:-100px;right:-100px;animation-delay:-3s}
.orb3{width:300px;height:300px;background:#06b6d4;top:40%;left:40%;animation-delay:-5s;opacity:0.08}
@keyframes float{ 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-30px) scale(1.05)} }

.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image: linear-gradient(var(--accent) 1px,transparent 1px), linear-gradient(90deg,var(--accent) 1px,transparent 1px);
  background-size:40px 40px; opacity: 0.04;
}

/* ── Card ── */
.card{
  position:relative;z-index:1;
  background: var(--surface);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:48px 44px;
  width:100%; max-width:420px;
  box-shadow: 0 40px 80px var(--card-shadow);
  animation:cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardIn{ from{opacity:0;transform:translateY(30px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }

.logo-wrap{text-align:center;margin-bottom:36px}
.logo-icon{
  width:64px;height:64px;border-radius:18px;margin:0 auto 16px;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  display:flex;align-items:center;justify-content:center; font-size:28px;
}
.logo-title{font-size:22px;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px}
.logo-sub{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace}

/* ── Form ── */
.form-group{margin-bottom:18px}
label{ display:block;font-size:12px;font-weight:600;color:var(--text2); text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px; }
.input-wrap{position:relative}
.input-wrap i.prefix{ position:absolute;left:14px;top:50%;transform:translateY(-50%); color:var(--muted);font-size:13px; }
.input-wrap i.toggle{ position:absolute;right:14px;top:50%;transform:translateY(-50%); color:var(--muted);font-size:13px;cursor:pointer; }

input{
  width:100%; background:var(--surface2);
  border:1px solid var(--border); border-radius:12px;
  color:var(--text); padding:13px 14px 13px 40px;
  font-size:14px; outline:none; transition: all 0.2s;
}
input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.15); }

.btn-login{
  width:100%; padding:14px; border-radius:12px; border:none; cursor:pointer;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:#fff; font-size:15px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 6px 20px rgba(59,130,246,0.4); transition:all 0.2s;
}
.btn-login:hover{box-shadow:0 8px 28px rgba(59,130,246,0.55);transform:translateY(-1px)}

.divider{ display:flex; align-items:center; gap:12px; margin:24px 0; color:var(--muted); font-size:12px; }
.divider::before,.divider::after{ content:''; flex:1; height:1px; background:var(--border); }

.back-link{ text-align:center; margin-top:20px; font-size:13px; color:var(--text2); }
.back-link a{ color:var(--accent); text-decoration:none; font-weight:600; }

.spinner{ display:none; width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; animation:spin 0.7s linear infinite; }
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="theme-switcher">
  <button class="theme-btn" id="btn-dark" onclick="setTheme('dark')" title="Dark Mode">🌙</button>
  <button class="theme-btn" id="btn-light" onclick="setTheme('light')" title="Light Mode">☀️</button>
  <button class="theme-btn" id="btn-auto" onclick="setTheme('auto')" title="System Default">◑</button>
</div>

<div class="bg-anim">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
</div>
<div class="bg-grid"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">🖥️</div>
    <div class="logo-title">ServerWatch</div>
    <div class="logo-sub">SMP Admin Control Panel</div>
  </div>

  <div class="form-group">
    <label>Username</label>
    <div class="input-wrap">
      <i class="fas fa-user prefix"></i>
      <input id="username" type="text" placeholder="Enter username">
    </div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <i class="fas fa-lock prefix"></i>
      <input id="password" type="password" placeholder="Enter password">
      <i class="fas fa-eye toggle" id="eyeIcon" onclick="togglePassword()"></i>
    </div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="login()">
    <span class="spinner" id="spinner"></span>
    <i class="fas fa-right-to-bracket" id="loginIcon"></i>
    <span id="loginText">Sign In to Admin Panel</span>
  </button>

  <div class="divider">or</div>

  <div class="back-link">
    <a href="/"><i class="fas fa-arrow-left"></i> Return to Dashboard</a>
  </div>
</div>

<script>
/* ── THEME ENGINE (Matches Dashboard) ── */
function applyTheme(t) {
  let target = t;
  if (t === 'auto') {
    target = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', target);
  
  // Update button highlights
  document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
  const activeBtn = document.getElementById('btn-' + t);
  if (activeBtn) activeBtn.classList.add('active');
}

function setTheme(t) {
  localStorage.setItem('sw-theme', t);
  applyTheme(t);
}

// Init theme on load
(function() {
  const saved = localStorage.getItem('sw-theme') || 'auto';
  applyTheme(saved);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (localStorage.getItem('sw-theme') === 'auto') applyTheme('auto');
  });
})();

/* ── LOGIN LOGIC ── */
function togglePassword() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash toggle';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye toggle';
  }
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) return;

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('loginIcon').style.display = 'none';

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (data.ok) window.location.href = '/admin';
    else {
      btn.disabled = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('loginIcon').style.display = 'inline';
      alert(data.error || 'Invalid credentials');
    }
  } catch (e) {
    btn.disabled = false;
    document.getElementById('spinner').style.display = 'none';
    alert('Connection error');
  }
}
</script>
</body>
</html>
